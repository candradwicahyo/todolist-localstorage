<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.4.9/sweetalert2.min.css">
  <title>todolist localstorage</title>
</head>
<body>
  
  <div class="container my-3">
    <div class="row">
      <div class="col-md-8 mx-auto">
        
        <div class="bg-primary bg-gradient p-4 shadow-sm mb-3">
          <h1 class="fw-normal text-white">Todolist Localstorage</h1>
          <p class="fw-light text-light">
            sebuah program dengan nama todolist localstorage yang dibuat dengan bahasa pemrograman javascript
          </p>
          <!-- form input pencarian data -->
          <input type="text" class="form-control py-2 px-3 search-input" placeholder="input pencarian data" autocomplete="off">
        </div>
        
        <!-- form tambah data -->
        <div class="input-group mb-3">
          <input type="text" class="form-control py-2 px-3 add-input" placeholder="masukkan sesuatu" autocomplete="off">
          <button class="btn btn-primary add-button">Tambah</button>
        </div>
        
        <!-- content -->
        <div class="content">
          <!--
          <div class="bg-white p-3 rounded shadow d-flex justify-content-between align-items-center mb-2">
            <p class="fw-light my-auto">Lorem ipsum dolor sit amet.</p>
            <button class="btn btn-outline-danger">hapus</button>
          </div>
          -->
        </div>
        
      </div>
    </div>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.4.9/sweetalert2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
